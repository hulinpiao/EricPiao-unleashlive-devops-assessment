# .github/workflows/validate.yml
# GitHub Actions CI/CD Pipeline for Terraform
# PRD: A DevOps engineer doesn't deploy from their laptop.
#
# 触发方式：
# - 自动触发：push 或 PR 到 main 分支 → 运行 Lint/Validate/Security Scan/Plan
# - 手动触发 (run_tests_only=true)：只运行测试
# - 手动触发 (apply_changes=true)：执行 terraform apply（需要先运行 Plan）

name: Terraform CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests_only:
        description: '只运行测试（跳过 Lint/Validate/Plan）'
        required: false
        default: false
        type: boolean
      apply_changes:
        description: '执行 terraform apply（需要先成功运行 Plan）'
        required: false
        default: false
        type: boolean
      apply_region:
        description: '要部署的区域'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - us-east-1
          - eu-west-1
      environment:
        description: '测试环境'
        required: false
        default: 'development'
        type: choice
        options:
          - development
          - production

env:
  TF_VERSION: "1.7.0"
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================================
  # Stage 1: Lint/Validate
  # PRD: Run standard IaC formatting and validation checks
  # Note: Does not require AWS credentials
  # Note: 手动触发测试或 apply 时跳过此步骤
  # ============================================================================
  lint-validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.run_tests_only != 'true' && github.event.inputs.apply_changes != 'true') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (us-east-1)
        run: cd terraform/us-east-1 && terraform init -backend=false

      - name: Terraform Init (eu-west-1)
        run: cd terraform/eu-west-1 && terraform init -backend=false

      - name: Terraform Validate (us-east-1)
        run: cd terraform/us-east-1 && terraform validate

      - name: Terraform Validate (eu-west-1)
        run: cd terraform/eu-west-1 && terraform validate

  # ============================================================================
  # Stage 2: Security Scan
  # PRD: Integrate a lightweight open-source static analysis tool (tfsec)
  # Note: Does not require AWS credentials
  # Note: 手动触发测试或 apply 时跳过此步骤
  # ============================================================================
  security-scan:
    name: "Security Scan (tfsec)"
    runs-on: ubuntu-latest
    needs: lint-validate
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.run_tests_only != 'true' && github.event.inputs.apply_changes != 'true') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false

  # ============================================================================
  # Stage 3: Plan
  # PRD: Generate an infrastructure plan/diff
  # Note: Requires AWS credentials to execute
  # Note: continue-on-error: true - PRD allows not providing credentials
  # Note: 手动触发测试或 apply 时跳过此步骤
  # ============================================================================
  plan:
    name: "Plan (${{ matrix.region }})"
    runs-on: ubuntu-latest
    needs: [lint-validate, security-scan]
    if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.run_tests_only != 'true' && github.event.inputs.apply_changes != 'true') }}
    strategy:
      matrix:
        region: [us-east-1, eu-west-1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: cd terraform/${{ matrix.region }} && terraform init

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform/${{ matrix.region }}
          terraform plan -out=tfplan -input=false
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.region }}
          path: terraform/${{ matrix.region }}/tfplan
          retention-days: 7

  # ============================================================================
  # Stage 4: Apply (手动触发)
  # 在 Plan 成功后，需要手动触发才能执行 terraform apply
  # 使用 GitHub Environment 实现审批流程（可选）
  # ============================================================================
  apply:
    name: "Apply (${{ matrix.region }})"
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_changes == 'true' }}
    # 使用 environment 可以配置手动审批
    # environment: production
    strategy:
      matrix:
        region: ${{ fromJSON(github.event.inputs.apply_region == 'all' && '["us-east-1", "eu-west-1"]' || format('["{0}"]', github.event.inputs.apply_region)) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: cd terraform/${{ matrix.region }} && terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.region }}
          path: terraform/${{ matrix.region }}

      - name: Terraform Apply
        run: |
          echo "=========================================="
          echo "🚀 TERRAFORM APPLY - ${{ matrix.region }}"
          echo "=========================================="
          echo ""
          echo "⚠️  This will apply the planned changes to AWS"
          echo ""
          cd terraform/${{ matrix.region }}
          terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Apply Summary
        if: always()
        run: |
          echo "=========================================="
          echo "APPLY COMPLETE - ${{ matrix.region }}"
          echo "=========================================="

  # ============================================================================
  # Stage 5: Test Execution
  # PRD: Add a step showing where your automated test script would execute
  #
  # 触发条件：
  # - 自动触发：需要 Plan 成功后执行
  # - 手动触发 (run_tests_only=true)：直接执行，跳过前面步骤
  # - 手动触发 (apply_changes=true)：在 Apply 成功后执行
  # ============================================================================
  integration-test:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    needs: [plan, apply]
    # 自动触发时：需要 plan 成功
    # 手动触发测试时：直接执行
    # 手动触发 apply 时：在 apply 成功后执行
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_tests_only == 'true') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.apply_changes == 'true' && needs.apply.result == 'success') ||
        (github.event_name != 'workflow_dispatch' && needs.plan.result == 'success')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Test Dependencies
        run: |
          cd tests
          pip install -r requirements.txt

      - name: Check Required Secrets
        run: |
          echo "=========================================="
          echo "Checking required secrets..."
          echo "=========================================="

          MISSING_SECRETS=""

          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            MISSING_SECRETS="${MISSING_SECRETS}AWS_ACCESS_KEY_ID "
          fi

          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            MISSING_SECRETS="${MISSING_SECRETS}AWS_SECRET_ACCESS_KEY "
          fi

          if [ -z "${{ secrets.COGNITO_USER_POOL_ID }}" ]; then
            MISSING_SECRETS="${MISSING_SECRETS}COGNITO_USER_POOL_ID "
          fi

          if [ -z "${{ secrets.COGNITO_CLIENT_ID }}" ]; then
            MISSING_SECRETS="${MISSING_SECRETS}COGNITO_CLIENT_ID "
          fi

          if [ -n "$MISSING_SECRETS" ]; then
            echo ""
            echo "⚠️  Missing secrets: $MISSING_SECRETS"
            echo ""
            echo "Please configure the following secrets in GitHub:"
            echo "  Settings → Secrets and variables → Actions"
            echo ""
            echo "Required secrets:"
            echo "  - AWS_ACCESS_KEY_ID"
            echo "  - AWS_SECRET_ACCESS_KEY"
            echo "  - COGNITO_USER_POOL_ID"
            echo "  - COGNITO_CLIENT_ID"
            echo "  - API_URL_US_EAST_1"
            echo "  - API_URL_EU_WEST_1"
            echo "  - TEST_EMAIL"
            echo "  - TEST_PASSWORD"
            echo ""
            echo "=========================================="
            echo "PLACEHOLDER MODE - Showing test structure"
            echo "=========================================="
          fi

      - name: Run Integration Tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          API_URL_US_EAST_1: ${{ secrets.API_URL_US_EAST_1 }}
          API_URL_EU_WEST_1: ${{ secrets.API_URL_EU_WEST_1 }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'development' }}
        run: |
          echo "=========================================="
          echo "🧪 INTEGRATION TEST EXECUTION"
          echo "=========================================="
          echo ""
          echo "Trigger: ${{ github.event_name }}"
          echo "Environment: $ENVIRONMENT"
          echo ""

          # 检查是否有必要的 secrets
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$TEST_EMAIL" ]; then
            echo "⚠️  Running in PLACEHOLDER mode (missing secrets)"
            echo ""
            echo "This step shows where the automated test"
            echo "script (tests/integration_test.py) would"
            echo "execute after successful deployment."
            echo ""
            echo "Test would verify:"
            echo "  1. Cognito authentication (JWT token)"
            echo "  2. us-east-1 /greet endpoint"
            echo "  3. us-east-1 /dispatch endpoint"
            echo "  4. eu-west-1 /greet endpoint"
            echo "  5. eu-west-1 /dispatch endpoint"
            echo "  6. SNS message delivery"
            echo "  7. Response latency comparison"
            echo ""
            echo "To execute tests manually:"
            echo "  cd tests"
            echo "  python integration_test.py \\"
            echo "    --email \$TEST_EMAIL \\"
            echo "    --password \$TEST_PASSWORD"
            echo ""
          else
            echo "✅ Running actual tests..."
            cd tests
            python integration_test.py \
              --email "$TEST_EMAIL" \
              --password "$TEST_PASSWORD" \
              --environment "$ENVIRONMENT"
          fi

          echo "=========================================="

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tests/results/
          retention-days: 30
